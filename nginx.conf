server {
    listen 80;
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Reverse Proxy Rules to prevent CORS issues (matches vite.config.js)
    
    location /api/google-ai/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
    }

    location /api/vertex-key/ {
        proxy_pass https://vertex-key.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host vertex-key.com;
    }

    location /api/gommo/ {
        proxy_pass https://api.gommo.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gommo.net;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
