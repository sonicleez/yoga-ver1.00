server {
    listen 80;
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # ============================================================
    # CRITICAL: Allow large request bodies (base64 reference images)
    # Default 1MB is too small for image generation payloads
    # ============================================================
    client_max_body_size 50m;
    client_body_buffer_size 10m;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Resolver for dynamic DNS of external proxy hosts
    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;

    # ============================================================
    # Reverse Proxy Rules — with proper timeouts & buffer for AI APIs
    # ============================================================

    location /api/google-ai/ {
        proxy_pass https://generativelanguage.googleapis.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for AI generation (can take 30-120s)
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;

        # Buffer for large base64 image responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
    }

    location /api/vertex-key/ {
        proxy_pass https://vertex-key.com/;
        proxy_ssl_server_name on;
        proxy_set_header Host vertex-key.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;

        # Buffer for large responses
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
    }

    location /api/gommo/ {
        proxy_pass https://api.gommo.net/;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gommo.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (Gommo polling can take a while)
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;

        # Buffer
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
