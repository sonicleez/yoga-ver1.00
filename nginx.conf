server {
    listen 80;
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Resolver for dynamic DNS of external proxy hosts
    resolver 8.8.8.8 1.1.1.1 valid=300s ipv6=off;

    # Reverse Proxy Rules with dynamic DNS handling to prevent startup crashes
    
    location /api/google-ai/ {
        set $backend "https://generativelanguage.googleapis.com";
        rewrite ^/api/google-ai/(.*) /$1 break;
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host generativelanguage.googleapis.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tăng timeout cho AI trả lâu
        proxy_read_timeout 180s;
        proxy_connect_timeout 60s;
    }

    location /api/vertex-key/ {
        set $backend "https://vertex-key.com";
        rewrite ^/api/vertex-key/(.*) /$1 break;
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host vertex-key.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tăng timeout
        proxy_read_timeout 180s;
        proxy_connect_timeout 60s;
    }

    location /api/gommo/ {
        set $backend "https://api.gommo.net";
        rewrite ^/api/gommo/(.*) /$1 break;
        proxy_pass $backend;
        proxy_ssl_server_name on;
        proxy_set_header Host api.gommo.net;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Tăng timeout
        proxy_read_timeout 180s;
        proxy_connect_timeout 60s;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp|mp4)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
